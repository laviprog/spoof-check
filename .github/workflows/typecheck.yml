name: Type check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: typecheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ty:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install

      # Full sync: ty needs the real deps (torch, gradio, ...) to resolve types.
      - name: Install dependencies
        run: uv sync --locked

      - name: Type check (ty)
        run: uv run ty check
